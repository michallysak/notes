<p-dialog
  [showHeader]="false"
  [(visible)]="visible"
  [modal]="true"
  [closable]="false"
  [dismissableMask]="true"
  [draggable]="false"
  (onHide)="onHide()"
>
  @if (isLoginForm()) {
    <app-login-form (toggleRegister)="toggleForm()" />
  } @else {
    <app-register-form (toggleToLogin)="toggleForm()" />
  }
</p-dialog>
