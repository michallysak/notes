# JWT configuration
smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem

# OpenAPI configuration
quarkus.smallrye-openapi.security-scheme-name=bearer_auth
quarkus.smallrye-openapi.security-scheme-description=Use /users/login to obtain token and include it in the Authorization
quarkus.smallrye-openapi.store-schema-directory=${project.build.directory}/swagger/
quarkus.smallrye-openapi.open-api-version=3.0.3

# CORS configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
